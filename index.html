<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 나누기 룰렛</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #111; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: sans-serif; overflow: hidden;
        }
        #controls { 
            position: fixed; top: 10px; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; text-align: center;
        }
        button { 
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            cursor: pointer; background-color: #f1c40f; 
            border: none; border-radius: 6px; color: #111; transition: 0.3s;
        }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #f39c12; }
        canvas { display: block; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #info { margin-top: 8px; font-size: 12px; color: #bdc3c7; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="controls">
        <button id="startBtn" disabled>물리 엔진 초기화 중...</button>
        <div id="info">파란색: 남자(8명) / 빨간색: 여자(5명)</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Common, Body } = Matter;

        const width = 600;
        const height = 1600; 
        const SPEED_MULT = 0.6; // 피드백 반영: 속도 0.6 

        function setupWorld(engine, seed, playerInfo = null) {
            Composite.clear(engine.world);
            Engine.clear(engine);
            Common._seed = seed;

            const bodies = [];
            
            // 외곽 벽
            bodies.push(Bodies.rectangle(-10, height/2, 20, height, { isStatic: true, render: { fillStyle: '#2c3e50' } }));
            bodies.push(Bodies.rectangle(width + 10, height/2, 20, height, { isStatic: true, render: { fillStyle: '#2c3e50' } }));
            bodies.push(Bodies.rectangle(width/2, height + 10, width, 20, { isStatic: true }));

            // 상단 깔때기 (y=200으로 올려서 공간 확보)
            bodies.push(Bodies.rectangle(90, 200, 300, 20, { isStatic: true, angle: 0.5, render: { fillStyle: '#34495e' } }));
            bodies.push(Bodies.rectangle(510, 200, 300, 20, { isStatic: true, angle: -0.5, render: { fillStyle: '#34495e' } }));

            // 회전 막대 (y=400, 600)
            const spinners = [
                Bodies.rectangle(200, 400, 140, 15, { isStatic: true, angle: 0, render: { fillStyle: '#e67e22' } }),
                Bodies.rectangle(400, 400, 140, 15, { isStatic: true, angle: 0, render: { fillStyle: '#e67e22' } }),
                Bodies.rectangle(300, 600, 180, 15, { isStatic: true, angle: 0, render: { fillStyle: '#e67e22' } })
            ];
            bodies.push(...spinners);

            // 핀볼 지형 (y=850부터 1050까지)
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 6; j++) {
                    let x = j * 90 + 75;
                    let y = i * 50 + 850; 
                    if (i % 2 === 1) x += 45;
                    if (x < width - 30) {
                        bodies.push(Bodies.circle(x, y, 6, { isStatic: true, render: { fillStyle: '#7f8c8d' } }));
                    }
                }
            }

            // 중앙 분리벽 (y=1130부터 바닥까지 완전히 분리)
            bodies.push(Bodies.rectangle(300, 1380, 16, 500, { isStatic: true, render: { fillStyle: '#2c3e50' } }));
            
            // 공이 분리벽 꼭대기에 멈추는 것을 방지하는 삼각형 지붕
            bodies.push(Bodies.polygon(300, 1120, 3, 14, { isStatic: true, angle: -Math.PI / 2, render: { fillStyle: '#2c3e50' } }));

            // 하단 센서
            const teamA_Sensor = Bodies.rectangle(150, height - 20, 260, 40, { 
                isStatic: true, isSensor: true, label: 'teamA', render: { fillStyle: '#2980b9', opacity: 0.4 } 
            });
            const teamB_Sensor = Bodies.rectangle(450, height - 20, 260, 40, { 
                isStatic: true, isSensor: true, label: 'teamB', render: { fillStyle: '#27ae60', opacity: 0.4 } 
            });
            bodies.push(teamA_Sensor, teamB_Sensor);
            Composite.add(engine.world, bodies);

            const players = [];
            for(let i = 0; i < 13; i++) {
                let col = i % 4;
                let row = Math.floor(i / 4);
                let xPos = 240 + (col * 40) + (Common.random() * 4 - 2); 
                let yPos = 30 - (row * 40); 
                
                let info = playerInfo ? playerInfo[i] : { gender: 'M', name: '' };
                let isMan = info.gender === 'M';
                
                let ball = Bodies.circle(xPos, yPos, 16, { 
                    label: 'player', 
                    restitution: 0.6, friction: 0.02, density: 0.03,
                    render: { fillStyle: playerInfo ? (isMan ? '#3498db' : '#e74c3c') : '#7f8c8d' }
                });
                
                ball.playerName = info.name;
                ball.isCaptain = false;
                players.push(ball);
            }
            if (playerInfo) Composite.add(engine.world, players);

            return { spinners, players };
        }

                const j = Math.floor(Common.random() * (i + 1));
