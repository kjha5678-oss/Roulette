<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 나누기 룰렛</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #111; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: sans-serif; overflow: hidden;
        }
        #controls { 
            position: fixed; top: 10px; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; text-align: center;
        }
        button { 
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            cursor: pointer; background-color: #f1c40f; 
            border: none; border-radius: 6px; color: #111; transition: 0.3s;
        }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #f39c12; }
        canvas { display: block; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #info { margin-top: 8px; font-size: 12px; color: #bdc3c7; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="controls">
        <button id="startBtn">룰렛 시작!</button>
        <div id="info">파란색: 남자(8명) / 빨간색: 여자(5명)</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        const width = 600;
        const height = 1600; 
        const SPEED_MULT = 0.6; // 속도는 0.6 유지

        const realEngine = Engine.create();
        realEngine.timing.timeScale = SPEED_MULT;

        const render = Render.create({
            element: document.body, engine: realEngine,
            options: { width: 600, height: 800, wireframes: false, background: '#1a1a24' }
        });

        let currentSpinners = [];
        let teamACaptainFound = false;
        let teamBCaptainFound = false;

        // 맵 설계 (배경 시뮬레이션 삭제, 바로 그리기)
        function setupWorld(playerConfig) {
            Composite.clear(realEngine.world);
            Engine.clear(realEngine);

            const bodies = [];
            
            // 외곽 벽
            bodies.push(Bodies.rectangle(-10, height/2, 20, height + 1000, { isStatic: true, render: { fillStyle: '#2c3e50' } }));
            bodies.push(Bodies.rectangle(width + 10, height/2, 20, height + 1000, { isStatic: true, render: { fillStyle: '#2c3e50' } }));
            bodies.push(Bodies.rectangle(width/2, height + 10, width, 20, { isStatic: true })); 
            bodies.push(Bodies.rectangle(width/2, -300, width, 20, { isStatic: true })); 

            // 진입로
            bodies.push(Bodies.rectangle(100, 200, 260, 20, { isStatic: true, angle: 0.4, render: { fillStyle: '#34495e' } }));
            bodies.push(Bodies.rectangle(500, 200, 260, 20, { isStatic: true, angle: -0.4, render: { fillStyle: '#34495e' } }));

            // 회전 막대
            currentSpinners = [
                Bodies.rectangle(150, 450, 120, 15, { isStatic: true, angle: 0, render: { fillStyle: '#e67e22' } }),
                Bodies.rectangle(450, 450, 120, 15, { isStatic: true, angle: 0, render: { fillStyle: '#e67e22' } }),
                Bodies.rectangle(300, 650, 160, 15, { isStatic: true, angle: 0, render: { fillStyle: '#e67e22' } })
            ];
            bodies.push(...currentSpinners);

            // 핀볼 지형
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 6; j++) {
                    let x = j * 85 + 85;
                    let y = i * 60 + 850; 
                    if (i % 2 === 1) x += 42.5;
                    if (x < width - 20) {
                        bodies.push(Bodies.circle(x, y, 6, { isStatic: true, render: { fillStyle: '#7f8c8d' } }));
                    }
                }
            }

            // 하단 분리벽
            bodies.push(Bodies.rectangle(300, 1400, 16, 500, { isStatic: true, render: { fillStyle: '#2c3e50' } }));
            bodies.push(Bodies.polygon(300, 1140, 3, 14, { isStatic: true, angle: -Math.PI / 2, render: { fillStyle: '#2c3e50' } }));

            const teamA_Sensor = Bodies.rectangle(150, height - 20, 260, 40, { 
                isStatic: true, isSensor: true, label: 'teamA', render: { fillStyle: '#2980b9', opacity: 0.4 } 
            });
            const teamB_Sensor = Bodies.rectangle(450, height - 20, 260, 40, { 
                isStatic: true, isSensor: true, label: 'teamB', render: { fillStyle: '#27ae60', opacity: 0.4 } 
            });
            bodies.push(teamA_Sensor, teamB_Sensor);
            Composite.add(realEngine.world, bodies);

            // 공 13개 배치
            const players = [];
            for(let i = 0; i < 13; i++) {
                let xPos = 120 + (i * 30) + (Math.random() * 10 - 5); 
                let yPos = (i % 2 === 0 ? 30 : 80) + (Math.random() * 10 - 5); 
                
                let info = playerConfig ? playerConfig[i] : { gender: 'M', name: '', _tx: -1 };
                let isMan = info.gender === 'M';
                
                let ball = Bodies.circle(xPos, yPos, 16, { 
                    label: 'player', 
                    restitution: 0.55, friction: 0.01, density: 0.04,
                    render: { fillStyle: playerConfig ? (isMan ? '#3498db' : '#e74c3c') : '#7f8c8d' }
                });
                
                ball.playerName = info.name;
                ball.isCaptain = false;
                // 위장 속성: _tx (0이면 왼쪽으로 유도, 1이면 오른쪽으로 유도)
                ball._tx = info._tx; 
                players.push(ball);
            }
            if (playerConfig) Composite.add(realEngine.world, players);
        }

        // 일반 셔플 함수
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = '룰렛 진행 중...';

            teamACaptainFound = false;
            teamBCaptainFound = false;

            // 1. 여기서 운명을 완벽하게 미리 결정합니다. (주작 로직)
            const maleNames = shuffleArray(['준하', '태윤', '성현', '민우', '재용', '민근', '태환', '중규']);
            const femaleNames = shuffleArray(['지연', '혜란', '가현', '정윤', '예지']);
            
            let teamA = [], teamB = [];
            
            // 남자는 무조건 4명씩 배정
            for(let i=0; i<4; i++) { 
                teamA.push({gender: 'M', name: maleNames.pop(), _tx: 0}); // _tx: 0은 A팀(왼쪽)
                teamB.push({gender: 'M', name: maleNames.pop(), _tx: 1}); // _tx: 1은 B팀(오른쪽)
            }
            
            // 여자는 2명/3명 랜덤 배분
            let aFemaleCount = (Math.random() > 0.5) ? 2 : 3;
            let bFemaleCount = (aFemaleCount === 2) ? 3 : 2;
            
            for(let i=0; i<aFemaleCount; i++) { teamA.push({gender: 'W', name: femaleNames.pop(), _tx: 0}); }
            for(let i=0; i<bFemaleCount; i++) { teamB.push({gender: 'W', name: femaleNames.pop(), _tx: 1}); }
            
            let finalConfig = shuffleArray([...teamA, ...teamB]);
            
            // 2. 결정된 명단으로 즉시 물리 엔진 세팅 및 드롭 시작
            setupWorld(finalConfig);
        });

        // 물리 엔진 루프
        const runner = Runner.create({ isFixed: true, delta: 1000 / 60 });
        setupWorld(); // 처음 빈 화면 세팅
        Render.run(render);
        Runner.run(runner, realEngine);

        Events.on(realEngine, 'beforeUpdate', () => {
            if (currentSpinners.length === 3) {
                Body.rotate(currentSpinners[0], 0.04 * SPEED_MULT);
                Body.rotate(currentSpinners[1], -0.04 * SPEED_MULT);
                Body.rotate(currentSpinners[2], 0.06 * SPEED_MULT);
            }

            // ⭐️ 핵심 사기(?) 로직: 보이지 않는 바람(Vector Force)으로 각자의 운명으로 인도합니다.
            const balls = Composite.allBodies(realEngine.world).filter(b => b.label === 'player');
            balls.forEach(ball => {
                if (ball.position.y > 300 && ball.position.y < 1140) {
                    let fX = 0;
                    // A팀(왼쪽) 가야 하는데 오른쪽에 치우쳐 있으면 왼쪽으로 끌어당김
                    if (ball._tx === 0 && ball.position.x > 260) fX = -0.002;
                    // B팀(오른쪽) 가야 하는데 왼쪽에 치우쳐 있으면 오른쪽으로 끌어당김
                    else if (ball._tx === 1 && ball.position.x < 340) fX = 0.002;
                    
                    // 중앙 분리벽에 다가오면 자석의 힘을 4배로 강력하게 발동시켜 무조건 넘겨버림
                    if (ball.position.y > 900) {
                        if (ball._tx === 0 && ball.position.x > 295) fX = -0.008;
                        if (ball._tx === 1 && ball.position.x < 305) fX = 0.008;
                    }
                    
                    // 자연스러운 물리 연산처럼 보이도록 Body.applyForce 사용
                    if (fX !== 0) {
                        Body.applyForce(ball, ball.position, { x: fX, y: 0 });
                    }
                }
            });
        });

        // 카메라 스크롤
        Events.on(realEngine, 'afterUpdate', () => {
            const balls = Composite.allBodies(realEngine.world).filter(b => b.label === 'player');
            if (balls.length > 0) {
                let lowestY = 0;
                balls.forEach(ball => { if (ball.position.y > lowestY) lowestY = ball.position.y; });
                let targetY = Math.max(400, Math.min(height - 400, lowestY + 100));
                Render.lookAt(render, { min: { x: 0, y: targetY - 400 }, max: { x: 600, y: targetY + 400 } });
            }
        });

        // 이름 및 왕관 렌더링
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(realEngine.world);

            context.font = "bold 13px 'Malgun Gothic', sans-serif";
            context.textAlign = "center";
            context.textBaseline = "middle";

            bodies.forEach(body => {
                if (body.label === 'player' && body.playerName) {
                    const screenX = body.position.x - render.bounds.min.x;
                    const screenY = body.position.y - render.bounds.min.y;

                    context.fillStyle = "#ffffff";
                    context.fillText(body.playerName, screenX, screenY);

                    if (body.isCaptain) {
                        context.font = "20px sans-serif";
                        context.fillText("👑", screenX, screenY - 24);
                        context.font = "bold 13px 'Malgun Gothic', sans-serif"; 
                    }
                }
            });
        });

        // 도착 감지 및 폭죽
        Events.on(realEngine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                const player = bodyA.label === 'player' ? bodyA : (bodyB.label === 'player' ? bodyB : null);
                const sensor = bodyA.isSensor ? bodyA : (bodyB.isSensor ? bodyB : null);

                if (player && sensor) {
                    if (sensor.label === 'teamA' && !teamACaptainFound) {
                        teamACaptainFound = true;
                        player.isCaptain = true; 
                        triggerConfetti(0.25);
                        checkEnd();
                    } else if (sensor.label === 'teamB' && !teamBCaptainFound) {
                        teamBCaptainFound = true;
                        player.isCaptain = true;
                        triggerConfetti(0.75);
                        checkEnd();
                    }
                }
            });
        });

        function checkEnd() {
            if (teamACaptainFound && teamBCaptainFound) {
                const btn = document.getElementById('startBtn');
                btn.innerText = '게임 종료 (다시 하려면 새로고침)';
            }
        }

        function triggerConfetti(xOrigin) {
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 50, spread: 60, scalar: 0.8,
                    origin: { x: xOrigin, y: 0.85 },
                    colors: ['#f1c40f', '#ffffff', '#3498db', '#2ecc71'],
                    zIndex: 1000, ticks: 120
                });
            }
        }
    </script>
</body>
</html>
